version: "3.9"

services:
  pixiv-auto-downloader:
    image: ghcr.io/ccawmiku/pixiv-auto-download-nas:1.0.0
    container_name: pixiv-auto-downloader
    ports:
      - "13004:8080"
    volumes:
      - /volume2/docker/pixiv-auto-download/config:/config
      - /volume2/docker/pixiv-auto-download/state:/state
      - /volume2/docker/pixiv-auto-download/downloads:/downloads
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
    command: >
      sh -c "python /app/pixiv_auto_worker.py --config /config/config.json"
    restart: unless-stopped
